# Frontend Ingress - Main app
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: challenges-frontend-ingress
  namespace: microservices
  labels:
    app.kubernetes.io/name: challenges-frontend
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: microservices.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: challenges-frontend
            port:
              number: 80
  - host: localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: challenges-frontend
            port:
              number: 80
---
# API Gateway Ingress - rewrite /api to /
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: microservices
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: microservices.local
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: gateway
            port:
              number: 8000
  - host: localhost
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: gateway
            port:
              number: 8000
---
# Consul Ingress - handle /v1 API, /ui UI, and /consul redirect
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consul-ingress
  namespace: microservices
  labels:
    app.kubernetes.io/name: consul
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: microservices.local
    http:
      paths:
      - path: /v1(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consul
            port:
              number: 8500
      - path: /ui(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consul
            port:
              number: 8500
      - path: /consul(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consul
            port:
              number: 8500
  - host: localhost
    http:
      paths:
      - path: /v1(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consul
            port:
              number: 8500
      - path: /ui(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consul
            port:
              number: 8500
      - path: /consul(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: consul
            port:
              number: 8500
---
