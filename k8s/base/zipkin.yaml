apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: microservices
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
        app.kubernetes.io/name: zipkin
        app.kubernetes.io/component: tracing
        app.kubernetes.io/part-of: microservices-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: zipkin
        image: openzipkin/zipkin:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ZIPKIN_BASE_PATH
          value: "/zipkin"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 9411
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: 9411
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 9411
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: microservices
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: zipkin
  ports:
  - port: 9411
    targetPort: 9411
  type: ClusterIP
