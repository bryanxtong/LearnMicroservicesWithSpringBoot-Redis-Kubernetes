apiVersion: apps/v1
kind: Deployment
metadata:
  name: challenges-frontend
  namespace: microservices
  labels:
    app.kubernetes.io/name: challenges-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: challenges-frontend
  template:
    metadata:
      labels:
        app: challenges-frontend
        app.kubernetes.io/name: challenges-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: microservices-demo
    spec:
      containers:
      - name: challenges-frontend
        image: challenges-frontend:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        # REACT_APP_* variables are build-time only (baked into the JS bundle
        # during `npm run build`). Setting them at runtime has no effect.
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: challenges-frontend
  namespace: microservices
  labels:
    app.kubernetes.io/name: challenges-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: challenges-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
