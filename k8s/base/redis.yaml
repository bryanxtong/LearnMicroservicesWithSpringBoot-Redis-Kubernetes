apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: microservices
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: datastore
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
data:
  redis.conf: |
    appendonly yes
    appendfsync everysec
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: microservices
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: datastore
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: microservices
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: datastore
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: datastore
        app.kubernetes.io/part-of: microservices-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: redis
        image: redis:7.0-alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 6379
          name: redis
        command:
          - redis-server
          - /etc/redis/redis.conf
        livenessProbe:
          exec:
            command:
              - redis-cli
              - ping
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
              - redis-cli
              - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
      - name: redis-config
        configMap:
          name: redis-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: microservices
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: datastore
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
