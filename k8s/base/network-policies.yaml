# Allow gateway, multiplication, and gamification to reach Keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-keycloak
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - gateway
                  - multiplication
                  - gamification
      ports:
        - protocol: TCP
          port: 8180
    # Allow ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8180
---
# Allow consul-importer Job to reach Consul
