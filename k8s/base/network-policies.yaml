# Default deny all ingress traffic in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress controller to reach externally-exposed services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-public-services
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - challenges-frontend
          - gateway
          - consul
          - zipkin
          - keycloak
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from ingress controller (typically in ingress-nginx namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow traffic from within the microservices namespace
    - from:
        - podSelector: {}
---
# Allow Java services to reach Redis, Consul, and Zipkin
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-infra
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - redis
          - consul
          - zipkin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - multiplication
                  - gamification
                  - gateway
                  - logs
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 8500
        - protocol: UDP
          port: 8600
        - protocol: TCP
          port: 9411
---
# Allow Consul to reach backend services for health checks
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-consul-to-backend
  namespace: microservices
  labels:
    app.kubernetes.io/part-of: microservices-demo
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - multiplication
          - gamification
          - gateway
          - logs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: consul
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8580
---
